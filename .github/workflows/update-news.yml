name: Agrárhírek frissítése

on:
  workflow_dispatch:

  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Repository letöltése
        uses: actions/checkout@v5

      - name: Python beállítása
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Python csomagok telepítése
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Agrárhírek beolvasása
        run: python fetch_news.py

      - name: Friss hírek mentése
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add news.json

          if git diff --cached --quiet; then
            echo "Nincs új változás."
          else
            git commit -m "Agrárhírek automatikus frissítése"
            git push
          fi
